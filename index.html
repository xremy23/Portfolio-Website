<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeremy C Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <section class="px-[10%] py-20 flex flex-col md:flex-row items-center justify-between gap-10">
        <div class="w-full md:w-[50%] space-y-6">
            <h1 class="text-5xl font-bold text-blue-600">Software Engineer</h1>
            <p class="text-xl text-gray-600 leading-relaxed">
                Computer Engineering Graduate | Jira Developer. Committed to learning and excellence from the Philippines.
            </p>
            <div class="flex flex-wrap gap-4">
                <a href="https://www.linkedin.com/in/jeremy-carino-472783315/" class="p-2 bg-blue-700 text-white rounded-full hover:bg-blue-800"><i data-lucide="linkedin"></i></a>
                <a href="https://github.com/xremy23" class="p-2 bg-gray-800 text-white rounded-full hover:bg-black"><i data-lucide="github"></i></a>
                <a href="mailto:carinojeremy23@email.com" class="p-2 bg-red-500 text-white rounded-full hover:bg-red-600"><i data-lucide="mail"></i></a>
                <a href="resume.pdf" download class="flex items-center gap-2 px-6 py-2 bg-green-600 text-white rounded-lg font-semibold hover:bg-green-700">
                    <i data-lucide="file-text"></i> Resume
                </a>
            </div>
        </div>
        
        <div class="w-full md:w-[30%] flex flex-col items-center">
            <div class="w-64 h-64 bg-gray-300 rounded-2xl mb-4 overflow-hidden border-4 border-white shadow-lg">
                <img src="https://via.placeholder.com/256" alt="Profile" class="w-full h-full object-cover">
            </div>
            <div class="flex items-center gap-2 text-gray-500 font-medium">
                <i data-lucide="map-pin" class="text-red-500"></i> Philippines
            </div>
        </div>
    </section>

    <section class="bg-white py-16 px-[10%]">
        <h2 class="text-3xl font-bold text-center mb-12">Tech Stack</h2>
        <div id="tech-grid" class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-8 gap-6">
            </div>
    </section>

    <section class="px-[10%] py-16">
        <div class="flex justify-center gap-8 mb-10 border-b border-gray-200">
            <button onclick="switchTab('educatio')" id="tab-edu" class="text-xl font-bold pb-2 border-b-4 border-blue-600 text-blue-600 transition">Education</button>
            <button onclick="switchTab('work')" id="tab-work" class="text-xl font-bold pb-2 border-b-4 border-transparent text-gray-400 transition">Work Experience</button>
        </div>

        <div id="content-list" class="max-w-3xl mx-auto space-y-4">
            </div>
    </section>

    <footer class="bg-gray-900 text-white py-12 px-[10%] text-center">
        <h2 class="text-3xl font-bold mb-4">Get In Touch</h2>
        <div class="flex justify-center gap-6 mb-8">
           <a href="#" class="hover:text-blue-400 transition">LinkedIn</a>
           <a href="#" class="hover:text-blue-400 transition">GitHub</a>
           <a href="#" class="hover:text-blue-400 transition">Viber</a>
        </div>
        <p class="text-sm text-gray-600">© 2026 | Built with HTML & Tailwind</p>
    </footer>

    <script>
        // Data
        const techStacks = [
            { n: 'HTML5', i: '🌐' }, { n: 'CSS3', i: '🎨' }, { n: 'Tailwind', i: '🌊' },
            { n: 'SQL', i: '💾' }, { n: 'Python', i: '🐍' }, { n: 'Java', i: '☕' },
            { n: 'JS', i: '📜' }, { n: 'ReactJS', i: '⚛️' }, { n: 'VueJS', i: '🖖' },
            { n: 'PHP', i: '🐘' }, { n: 'Laravel', i: '💎' }, { n: 'Flask', i: '🧪' },
            { n: 'Git', i: '🔧' }, { n: 'Github', i: '🐙' }, { n: 'Jira', i: '📋' },
            { n: 'Wordpress', i: '📝' }
        ];

        const data = {
            education: [
                { name: 'SPCBA', logo: '🏫', desc: 'Bachelor of Science in Computer Engineering' },
                { name: 'MNHS', logo: '🏫', desc: 'Secondary Education' }
            ],
            work: [
                { name: 'YDC', logo: '💼', desc: 'IT Support Intern, Frontend Web Developer' },
                { name: 'CNVG', logo: '💼', desc: 'Jira Developer' }
            ]
        };

        // Render Tech Stack
        const techGrid = document.getElementById('tech-grid');
        techStacks.forEach(tech => {
            techGrid.innerHTML += `
                <div class="flex flex-col items-center p-4 border rounded-xl hover:shadow-md transition">
                    <span class="text-3xl mb-2">${tech.i}</span>
                    <span class="text-xs font-semibold text-gray-700">${tech.n}</span>
                </div>`;
        });

        // Tab Switching Logic
        function switchTab(type) {
            const list = document.getElementById('content-list');
            const btnEdu = document.getElementById('tab-edu');
            const btnWork = document.getElementById('tab-work');

            // Toggle Classes
            if(type === 'education') {
                btnEdu.className = "text-xl font-bold pb-2 border-b-4 border-blue-600 text-blue-600";
                btnWork.className = "text-xl font-bold pb-2 border-b-4 border-transparent text-gray-400";
            } else {
                btnWork.className = "text-xl font-bold pb-2 border-b-4 border-blue-600 text-blue-600";
                btnEdu.className = "text-xl font-bold pb-2 border-b-4 border-transparent text-gray-400";
            }

            // Render List
            list.innerHTML = data[type].map(item => `
                <div class="flex items-center gap-6 p-6 bg-white rounded-xl shadow-sm border border-gray-100">
                    <div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center text-2xl">${item.logo}</div>
                    <div>
                        <h3 class="text-xl font-bold">${item.name}</h3>
                        <p class="text-gray-600">${item.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        // Initialize
        switchTab('education');
        lucide.createIcons();
    </script>
</body>
</html>
